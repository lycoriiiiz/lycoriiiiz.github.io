<html>
<head>
</head>
<title> регистрация </title>
<link rel="stylesheet" href="regstyle.css"
<body>
    <div class="wrapper">
        <form action="">
            <h1> Регистрация </h1>
            <div class="input-box">
                <input type="text" maxlength="100" placeholder="Ваше имя" required>
            </div>
            <div class="input-box">
                <input type="text" maxlength="100" placeholder="Ваша фамилия" required>
            </div>
            <div class="input-box">
                <input type="password" minlength="8" placeholder="Придумайте пароль" required>
            </div>
            <div class="input-box">
                <label for="town"> Ваш город </label>
                <select name="town" id="town">
                    <option value="ms"> Москва </option>
                    <option value="sp"> Санкт-Петербург </option>
                    <option value="uf"> Уфа </option>
                </select>
            </div>
            <div class="remember">
                <label form="">
                    <input type="checkbox"> Запомнить меня </label>
            </div>
            <button type="submit" class="btn"> Зарегистрироваться </button>
        </form>
    </div>
</body>
</html>
